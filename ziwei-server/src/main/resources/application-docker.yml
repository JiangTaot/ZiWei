# Docker 容器环境配置
# 使用环境变量覆盖默认值，方便 docker-compose / k8s 部署

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:ziwei}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0

  sql:
    init:
      mode: never

logging:
  level:
    com.ziwei: info

# AI 配置
ziwei:
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-v4-pro
      temperature: 0.7
      max-tokens: 4096
spring.ai.openai.api-key: unused
# JWT 配置
jwt:
  secret: ${JWT_SECRET:ziwei-doushu-jwt-secret-key-2024}
  expiration: 604800000

# 微信小程序
wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
